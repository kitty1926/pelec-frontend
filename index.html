<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div class="container mx-auto p-6 max-w-4xl">
        <header class="mb-8 flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Task Manager</h1>
                <p class="text-sm text-gray-500 mt-1">Connected Live to PythonAnywhere API</p>
            </div>
            <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold uppercase tracking-wider animate-pulse">Live</span>
        </header>

        <main>
            <h2 class="text-xl font-semibold text-gray-700 mb-4 flex items-center gap-2">Active Records</h2>
            <div id="tasks-container" class="grid gap-4 md:grid-cols-2">
                <div class="col-span-2 text-center text-gray-500 py-12">
                    <p class="animate-bounce">Fetching records from backend API...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
